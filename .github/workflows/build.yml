name: Build Kino APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          ./gradlew clean assembleStableDebug --no-daemon --stacktrace > build_output.txt 2>&1 || echo "BUILD_FAILED=true" >> $GITHUB_ENV

      - name: Print Only Errors and Warnings
        if: always()
        run: |
          echo "=== COMPILATION ERRORS ==="
          grep -E "^e:" build_output.txt | head -50 || echo "No Kotlin compiler errors found"
          echo ""
          echo "=== GRADLE FAILURES ==="
          grep -E "FAILED|What went wrong|Caused by:" build_output.txt | head -20 || echo "No Gradle failure messages found"
          echo "=== END ERRORS ==="

      - name: Fail job if build failed
        if: env.BUILD_FAILED == 'true'
        run: exit 1
